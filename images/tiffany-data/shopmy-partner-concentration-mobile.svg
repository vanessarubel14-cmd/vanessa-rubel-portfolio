<text x="316.0" y="24.0" class="value" text-anchor="end">35.6% top five</text>
<rect x="14" y="35" width="302" height="17" rx="6" fill="#FEC6E9"/>
<rect x="14" y="35" width="107.4" height="17" rx="6" fill="#0212EE"/>
<text x="14.0" y="73.0" class="label" text-anchor="start">Order share</text>
<text x="316.0" y="73.0" class="value" text-anchor="end">50.0% top five</text>
<rect x="14" y="84" width="302" height="17" rx="6" fill="#FEC6E9"/>
<rect x="14" y="84" width="151.0" height="17" rx="6" fill="#0212EE"/>
<text x="14.0" y="122.0" class="label" text-anchor="start">Net order volume share</text>
<text x="316.0" y="122.0" class="value" text-anchor="end">74.6% top five</text>
<rect x="14" y="133" width="302" height="17" rx="6" fill="#FEC6E9"/>
<rect x="14" y="133" width="225.3" height="17" rx="6" fill="#0212EE"/>
<text x="14.0" y="171.0" class="label" text-anchor="start">Commission share</text>
