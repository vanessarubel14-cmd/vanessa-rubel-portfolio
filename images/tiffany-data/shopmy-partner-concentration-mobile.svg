<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 330 220" role="img" aria-labelledby="chart-title chart-description">
<title id="chart-title">A focused set of partners generated outsized value</title>
<desc id="chart-description">The top five ShopMy partners by net order volume generated 35.6 percent of clicks, 50 percent of orders, 74.6 percent of net order volume, and 74.0 percent of commissions. Their click-to-order conversion was 1.42 percent versus 0.78 percent for all other partners, and net order volume per order was 577 dollars and 57 cents versus 196 dollars and 70 cents.</desc>
<style>
text{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;fill:#1A1A1A}
.eyebrow{font-size:13px;font-weight:700;letter-spacing:1.8px;fill:#D20001}
.title{font-size:34px;font-weight:700;letter-spacing:-.7px;fill:#0212EE}
.subtitle{font-size:15px;fill:#5D5D56}
.metric{font-size:31px;font-weight:700;fill:#0212EE}
.metric-sm{font-size:24px;font-weight:700;fill:#0212EE}
.label{font-size:17px;font-weight:700}
.small{font-size:14px;fill:#5D5D56}
.axis{font-size:14px;fill:#5D5D56}
.value{font-size:16.5px;font-weight:700}
</style>
