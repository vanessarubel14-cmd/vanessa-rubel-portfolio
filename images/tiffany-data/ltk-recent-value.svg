<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 232" role="img" aria-labelledby="chart-title chart-description">
<title id="chart-title">Recent LTK orders delivered more value</title>
<desc id="chart-description">The latest 30 days generated 44.4 percent of the 90-day commission total. Compared with the preceding 60 days, commission per order was 21 dollars and 14 cents versus 9 dollars and 90 cents, items per order were 2.63 versus 1.72, and average commission per day was 281 dollars and 12 cents versus 175 dollars and 81 cents.</desc>
<style>
text{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;fill:#1A1A1A}
.eyebrow{font-size:13px;font-weight:700;letter-spacing:1.8px;fill:#D20001}
.title{font-size:34px;font-weight:700;letter-spacing:-.7px;fill:#0212EE}
.subtitle{font-size:15px;fill:#5D5D56}
.metric{font-size:31px;font-weight:700;fill:#0212EE}
.metric-sm{font-size:24px;font-weight:700;fill:#0212EE}
.label{font-size:17px;font-weight:700}
.small{font-size:14px;fill:#5D5D56}
.axis{font-size:14px;fill:#5D5D56}
.value{font-size:16.5px;font-weight:700}
</style>
