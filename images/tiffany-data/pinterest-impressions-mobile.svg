<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 330 180" role="img" aria-labelledby="chart-title chart-description">
<title id="chart-title">Pinterest visibility across the content calendar</title>
<desc id="chart-description">Monthly Pinterest impressions from November 2024 through September 15, 2025. The monthly totals sum to 97,937. September is a partial month with 15 dates, and the final two dates are estimated.</desc>
<style>
text{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;fill:#1A1A1A}
.eyebrow{font-size:13px;font-weight:700;letter-spacing:1.8px;fill:#D20001}
.title{font-size:34px;font-weight:700;letter-spacing:-.7px;fill:#0212EE}
.subtitle{font-size:15px;fill:#5D5D56}
.metric{font-size:31px;font-weight:700;fill:#0212EE}
.metric-sm{font-size:24px;font-weight:700;fill:#0212EE}
.label{font-size:17px;font-weight:700}
.small{font-size:14px;fill:#5D5D56}
.axis{font-size:14px;fill:#5D5D56}
.value{font-size:16.5px;font-weight:700}
</style>
<defs><pattern id="partial" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="8" height="8" fill="#FEC6E9"/><rect width="3" height="8" fill="#D20001"/></pattern></defs>
<rect width="330" height="180" rx="8" fill="#FAF9F1"/>
<rect x="12.0" y="49.1" width="24.2" height="74.9" rx="4" fill="#0212EE"/>
