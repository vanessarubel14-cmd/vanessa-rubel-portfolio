<text x="80.5" y="141.0" class="axis" text-anchor="middle">Jan</text>
<rect x="96.5" y="19.5" width="24.2" height="104.5" rx="4" fill="#0212EE"/>
<text x="108.6" y="141.0" class="axis" text-anchor="middle">Feb</text>
<rect x="124.7" y="35.2" width="24.2" height="88.8" rx="4" fill="#0212EE"/>
<text x="136.8" y="141.0" class="axis" text-anchor="middle">Mar</text>
<rect x="152.9" y="43.7" width="24.2" height="80.3" rx="4" fill="#0212EE"/>
