<rect x="104.7" y="19.5" width="26.9" height="104.5" rx="4" fill="#0212EE"/>
<text x="118.2" y="141.0" class="axis" text-anchor="middle">Feb</text>
<rect x="135.6" y="35.2" width="26.9" height="88.8" rx="4" fill="#0212EE"/>
<text x="149.1" y="141.0" class="axis" text-anchor="middle">Mar</text>
<rect x="166.5" y="43.7" width="26.9" height="80.3" rx="4" fill="#0212EE"/>
